<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .card { fill: #ffffff; stroke: #0f172a; stroke-width: 2.2; rx: 18; }
      .header { fill: #0f172a; }
      .htext { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .field { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .pk { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .note { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .rel { stroke: #0f172a; stroke-width: 2.4; fill: none; }
      .crow { stroke: #0f172a; stroke-width: 2.4; }
      .dash { stroke: #334155; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff" />

  <text x="70" y="70" class="title">Figure 3: Database Schema / ER Diagram — EduPredict</text>
  <text x="70" y="102" class="subtitle">Core tables: users, refresh_tokens, academic_records (UUID primary keys, FK relationships)</text>

  <!-- USERS -->
  <rect x="90" y="170" width="420" height="370" class="card" />
  <rect x="90" y="170" width="420" height="52" class="header" rx="18" ry="18" />
  <text x="120" y="204" class="htext">users</text>

  <text x="120" y="250" class="pk">id (UUID) — PK</text>
  <text x="120" y="278" class="field">email (String, unique, indexed)</text>
  <text x="120" y="306" class="field">full_name (String)</text>
  <text x="120" y="334" class="field">role (Enum: admin/teacher/student, indexed)</text>
  <text x="120" y="362" class="field">password_hash (String)</text>
  <text x="120" y="390" class="field">is_active (Boolean)</text>
  <text x="120" y="418" class="field">created_at (DateTime TZ)</text>
  <text x="120" y="446" class="field">updated_at (DateTime TZ)</text>

  <text x="120" y="504" class="note">Constraint: email unique; role enum user_role</text>

  <!-- REFRESH TOKENS -->
  <rect x="520" y="170" width="420" height="370" class="card" />
  <rect x="520" y="170" width="420" height="52" class="header" rx="18" ry="18" />
  <text x="550" y="204" class="htext">refresh_tokens</text>

  <text x="550" y="250" class="pk">id (UUID) — PK</text>
  <text x="550" y="278" class="field">user_id (UUID) — FK → users.id (on delete CASCADE)</text>
  <text x="550" y="306" class="field">jti (String, unique, indexed)</text>
  <text x="550" y="334" class="field">token_hash (String, indexed)</text>
  <text x="550" y="362" class="field">expires_at (DateTime TZ, indexed)</text>
  <text x="550" y="390" class="field">revoked_at (DateTime TZ, nullable)</text>
  <text x="550" y="418" class="field">created_at (DateTime TZ)</text>

  <text x="550" y="504" class="note">Purpose: refresh-token rotation + revocation</text>

  <!-- ACADEMIC RECORDS -->
  <rect x="520" y="560" width="820" height="290" class="card" />
  <rect x="520" y="560" width="820" height="52" class="header" rx="18" ry="18" />
  <text x="550" y="594" class="htext">academic_records</text>

  <text x="550" y="640" class="pk">id (UUID) — PK</text>
  <text x="550" y="668" class="field">student_user_id (UUID) — FK → users.id (on delete CASCADE, indexed)</text>
  <text x="550" y="696" class="field">attendance_pct (int, 0–100)</text>
  <text x="550" y="724" class="field">assignments_pct (int, 0–100)</text>
  <text x="550" y="752" class="field">quizzes_pct (int, 0–100)</text>
  <text x="980" y="696" class="field">exams_pct (int, 0–100)</text>
  <text x="980" y="724" class="field">gpa (float, 0.0–4.0)</text>
  <text x="980" y="752" class="field">term (String, nullable)</text>
  <text x="980" y="780" class="field">created_at, updated_at (DateTime TZ)</text>

  <text x="550" y="820" class="note">Constraints: ck_* range checks for percentages and GPA</text>

  <!-- Relationships -->
  <!-- users -> refresh_tokens (1 to many) -->
  <path class="rel" d="M 510 280 C 520 280, 520 280, 520 280" />
  <!-- crow's foot near refresh_tokens -->
  <line class="crow" x1="520" y1="280" x2="540" y2="270" />
  <line class="crow" x1="520" y1="280" x2="540" y2="280" />
  <line class="crow" x1="520" y1="280" x2="540" y2="290" />
  <!-- single line near users -->
  <line class="crow" x1="510" y1="280" x2="490" y2="280" />

  <text x="365" y="265" class="note">1</text>
  <text x="548" y="265" class="note">N</text>

  <!-- users -> academic_records (1 to many) -->
  <path class="rel" d="M 300 540 C 300 610, 420 650, 520 680" />
  <!-- crow's foot near academic_records -->
  <line class="crow" x1="520" y1="680" x2="540" y2="670" />
  <line class="crow" x1="520" y1="680" x2="540" y2="680" />
  <line class="crow" x1="520" y1="680" x2="540" y2="690" />
  <!-- single line near users -->
  <line class="crow" x1="300" y1="540" x2="300" y2="520" />

  <text x="285" y="520" class="note">1</text>
  <text x="548" y="665" class="note">N</text>

  <!-- Notes about keys -->
  <path class="dash" d="M 980 210 C 1180 210, 1180 210, 1320 210" />
  <text x="985" y="238" class="note">All tables use UUID primary keys; FK deletes cascade from users → dependent tables</text>
</svg>
