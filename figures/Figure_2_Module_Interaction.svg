<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #0f172a; stroke-width: 2.2; rx: 16; }
      .group { fill: #f8fafc; stroke: #0f172a; stroke-width: 2.2; rx: 18; }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #0f172a; stroke-width: 2.3; fill: none; marker-end: url(#arrowHead); }
      .arrowGray { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrowHeadGray); }
      .pill { fill: #e2e8f0; stroke: #334155; stroke-width: 1.3; rx: 12; }
    </style>

    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#0f172a" />
    </marker>
    <marker id="arrowHeadGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff" />

  <text x="70" y="70" class="title">Figure 2: Module Interaction Diagram — EduPredict Backend</text>
  <text x="70" y="102" class="subtitle">FastAPI routers, services, DB models, ML pipeline, and registry interactions</text>

  <!-- Group: Routers -->
  <rect x="80" y="150" width="1240" height="250" class="group" />
  <text x="110" y="190" class="label">FastAPI Routers</text>

  <rect x="120" y="220" width="220" height="120" class="box" />
  <text x="140" y="255" class="label" style="font-size:16px;">auth</text>
  <text x="140" y="282" class="small">/auth/register</text>
  <text x="140" y="304" class="small">/auth/login</text>
  <text x="140" y="326" class="small">/auth/refresh, /logout</text>

  <rect x="370" y="220" width="220" height="120" class="box" />
  <text x="390" y="255" class="label" style="font-size:16px;">admin</text>
  <text x="390" y="282" class="small">/admin/users</text>
  <text x="390" y="304" class="small">create/update users</text>

  <rect x="620" y="220" width="260" height="120" class="box" />
  <text x="640" y="255" class="label" style="font-size:16px;">academics</text>
  <text x="640" y="282" class="small">/academics (CRUD)</text>
  <text x="640" y="304" class="small">/academics/me (student)</text>

  <rect x="910" y="220" width="230" height="120" class="box" />
  <text x="930" y="255" class="label" style="font-size:16px;">ml</text>
  <text x="930" y="282" class="small">/ml/predict, /explain</text>
  <text x="930" y="304" class="small">/ml/train, /models</text>

  <rect x="1160" y="220" width="140" height="120" class="box" />
  <text x="1180" y="255" class="label" style="font-size:16px;">health</text>
  <text x="1180" y="282" class="small">/health</text>
  <text x="1180" y="304" class="small">status OK</text>

  <!-- Shared deps -->
  <rect x="80" y="430" width="1240" height="160" class="group" />
  <text x="110" y="470" class="label">Shared Dependencies &amp; Services</text>

  <rect x="120" y="500" width="300" height="70" class="box" />
  <text x="140" y="535" class="label" style="font-size:16px;">deps/auth</text>
  <text x="140" y="558" class="small">get_current_user(), require_roles()</text>

  <rect x="450" y="500" width="300" height="70" class="box" />
  <text x="470" y="535" class="label" style="font-size:16px;">core/security</text>
  <text x="470" y="558" class="small">password hash, JWT sign/verify</text>

  <rect x="780" y="500" width="260" height="70" class="box" />
  <text x="800" y="535" class="label" style="font-size:16px;">core/db</text>
  <text x="800" y="558" class="small">async session dependency</text>

  <rect x="1070" y="500" width="230" height="70" class="box" />
  <text x="1090" y="535" class="label" style="font-size:16px;">core/settings</text>
  <text x="1090" y="558" class="small">env config (CORS, DB, etc.)</text>

  <!-- Data & ML -->
  <rect x="80" y="620" width="1240" height="240" class="group" />
  <text x="110" y="660" class="label">Data Layer &amp; ML Layer</text>

  <rect x="120" y="700" width="340" height="130" class="box" />
  <text x="140" y="735" class="label" style="font-size:16px;">Database Models</text>
  <text x="140" y="762" class="small">User, RefreshToken, AcademicRecord</text>
  <text x="140" y="786" class="small">SQL constraints + indexes</text>

  <rect x="500" y="700" width="380" height="130" class="box" />
  <text x="520" y="735" class="label" style="font-size:16px;">ML Pipeline</text>
  <text x="520" y="762" class="small">preprocess → predict_proba → label</text>
  <text x="520" y="786" class="small">explain_with_shap_tree (top-k factors)</text>
  <rect x="520" y="800" width="330" height="24" class="pill" />
  <text x="532" y="817" class="small">Ensemble: Logistic Regression + LightGBM</text>

  <rect x="920" y="700" width="380" height="130" class="box" />
  <text x="940" y="735" class="label" style="font-size:16px;">Model Registry</text>
  <text x="940" y="762" class="small">ml_registry/models/&lt;version&gt;/</text>
  <text x="940" y="786" class="small">model.joblib + metadata.json + LATEST</text>
  <text x="940" y="810" class="small">promote(version) → updates LATEST</text>

  <!-- Arrows from routers to deps -->
  <path class="arrow" d="M 230 340 C 230 410, 230 470, 270 500" />
  <path class="arrow" d="M 480 340 C 480 420, 520 455, 560 500" />
  <path class="arrow" d="M 750 340 C 760 420, 820 455, 860 500" />
  <path class="arrow" d="M 1025 340 C 1025 420, 980 455, 930 500" />

  <text x="210" y="412" class="small">auth checks</text>
  <text x="470" y="412" class="small">JWT/RBAC</text>
  <text x="740" y="412" class="small">DB session</text>
  <text x="1010" y="412" class="small">ML calls</text>

  <!-- Arrows deps to models and ML -->
  <path class="arrowGray" d="M 910 570 C 910 640, 860 660, 770 700" />
  <text x="860" y="640" class="small">queries academic records</text>

  <path class="arrowGray" d="M 1025 340 C 1050 520, 1020 650, 960 700" />
  <text x="1060" y="520" class="small">train/list/promote</text>

  <path class="arrowGray" d="M 880 765 C 910 765, 910 765, 920 765" />
  <text x="890" y="748" class="small">load/save artifacts</text>

  <!-- Note -->
  <text x="70" y="885" class="small">Note: Feature-based ML requests are restricted to Teacher/Admin; students can only predict/explain for their own stored records.</text>
</svg>
